<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>🍧 胖胖冰果店 Ice World</title>
		<style>
			body {
				font-family: Arial;
				background: #FFF8E8;
			}
			
			fieldset {
				margin: 20px;
				padding: 20px;
				border: 2px solid orange;
				border-radius: 15px;
				background: white;
			}
			
			legend {
				font-size: 24px;
				font-weight: bold;
			}
			
			table {
				padding: 8px;
			}
			
			button {
				font-size: 18px;
				padding: 8px 20px;
			}
			
			h1 {
				color: #ff6600;
			}
			
		</style>
	</head>
	<body>
		<h1 align="center">🍧 胖胖冰果店 Ice World 🍨</h1>
		<!-- 表單 -->
		<form method="post" action="/JavaWeb/ice">
			
			<fieldset>
				<legend>🍨 客製化您的剉冰</legend>
				<table border=0>
					<tr>
						<td>🍧 冰品：</td>
						<td>
							<select name="iceName">
								<option value="芒果冰">🥭 芒果冰</option>
								<option value="草莓冰">🍓 草莓冰</option>
								<option value="抹茶冰">🍵 抹茶冰</option>
								<option value="巧克力雪花冰">🍫 巧克力雪花冰</option>
								<option value="芋頭牛奶冰">🟣 芋頭牛奶冰</option>
							</select>
						</td>
					</tr>
					<tr>
						<td>📏 大小：</td>
						<td>
							<input type="radio" name="size" value="S"> 小碗
							<input type="radio" name="size" value="M"> 中碗
							<input type="radio" name="size" value="L"> 大碗
						</td>
					</tr>
					<tr>
						<td>🍬 甜度：</td>
						<td>
							<input type="range" name="sweet" min="0" max="10" value="5" oninput="sweetValue.innerText=this.value" >
							<span id="sweetValue">5</span>/10
						</td>
					</tr>
					<tr>
						<td>❄️ 冰量：</td>
						<td>
							<input type="range" name="ice" min="0" max="10" value="5" oninput="iceValue.innerText=this.value" >
							<span id="iceValue">5</span>/10
						</td>
					</tr>
					<tr>
						<td>🥜 配料（可複選）：</td>
						<td>
							
						</td>
					</tr>
				</table>
				
			</fieldset>
			
		</form>
	
	</body>
</html>
